<!doctype html>
<!--
  🖼️ UI preview của tính năng — sinh bởi PO (skill po-feature, style effective-html).
  File TỰ CHỨA (inline CSS), mở trực tiếp bằng trình duyệt. Thay nội dung mockup bên dưới.
-->
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>UI Preview — &lt;Tên tính năng&gt;</title>
<style>
  :root { --bg:#0b0f17; --card:#141a26; --ink:#e7ecf3; --mut:#8b96a8; --acc:#5b8cff; }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.5 -apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--ink); padding:32px; }
  h1 { font-size:20px; margin:0 0 4px; }
  .sub { color:var(--mut); margin:0 0 24px; }
  .screens { display:flex; gap:20px; flex-wrap:wrap; }
  .phone { width:240px; background:var(--card); border:1px solid #243049; border-radius:22px; padding:16px; }
  .phone h2 { font-size:13px; color:var(--acc); margin:0 0 12px; text-transform:uppercase; letter-spacing:.06em; }
  .block { background:#0f1622; border:1px dashed #2c3a55; border-radius:10px; padding:14px; margin-bottom:10px; color:var(--mut); }
</style>
</head>
<body>
  <h1>&lt;Tên tính năng&gt;</h1>
  <p class="sub">Mockup luồng chính — thay các block bằng UI thật.</p>
  <div class="screens">
    <div class="phone">
      <h2>Màn 1</h2>
      <div class="block">Nội dung / nút / input…</div>
      <div class="block">…</div>
    </div>
    <div class="phone">
      <h2>Màn 2</h2>
      <div class="block">…</div>
    </div>
  </div>
</body>
</html>
